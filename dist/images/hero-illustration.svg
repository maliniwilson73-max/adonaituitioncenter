<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480" role="img" aria-label="Students learning illustration" fill="none">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="hbook" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- soft blob -->
  <circle cx="300" cy="240" r="220" fill="#FFFFFF" opacity="0.10"/>
  <circle cx="300" cy="240" r="160" fill="#FFFFFF" opacity="0.08"/>
  <!-- floating cards -->
  <g opacity="0.95">
    <rect x="70" y="90" width="150" height="100" rx="16" fill="#FFFFFF"/>
    <rect x="88" y="112" width="80" height="10" rx="5" fill="#DBEAFE"/>
    <rect x="88" y="130" width="114" height="8" rx="4" fill="#EFF6FF"/>
    <rect x="88" y="146" width="96" height="8" rx="4" fill="#EFF6FF"/>
    <circle cx="98" cy="172" r="7" fill="#FBBF24"/>
    <rect x="112" y="167" width="60" height="9" rx="4" fill="#DBEAFE"/>
  </g>
  <g opacity="0.95">
    <rect x="380" y="300" width="160" height="108" rx="16" fill="#FFFFFF"/>
    <circle cx="410" cy="330" r="14" fill="#2563EB"/>
    <rect x="434" y="322" width="86" height="9" rx="4" fill="#DBEAFE"/>
    <rect x="434" y="338" width="66" height="8" rx="4" fill="#EFF6FF"/>
    <rect x="400" y="360" width="120" height="8" rx="4" fill="#EFF6FF"/>
    <rect x="400" y="376" width="90" height="8" rx="4" fill="#EFF6FF"/>
  </g>
  <!-- central open book -->
  <g transform="translate(300 250)">
    <path d="M-120 40 C -80 10 -30 10 0 30 C 30 10 80 10 120 40 L120 90 C 80 62 30 62 0 82 C -30 62 -80 62 -120 90 Z" fill="url(#hbook)"/>
    <path d="M0 30 L0 82" stroke="#B45309" stroke-width="3"/>
    <path d="M-104 44 C -72 26 -34 26 -8 40" stroke="#FFFFFF" stroke-width="3" opacity="0.7" fill="none"/>
    <path d="M104 44 C 72 26 34 26 8 40" stroke="#FFFFFF" stroke-width="3" opacity="0.7" fill="none"/>
  </g>
  <!-- graduation cap -->
  <g transform="translate(300 150)">
    <path d="M0 -40 L70 -10 L0 20 L-70 -10 Z" fill="#0F172A"/>
    <path d="M-42 2 v26 c0 12 20 20 42 20 s42 -8 42 -20 v-26 l-42 18 Z" fill="#1E3A8A"/>
    <line x1="70" y1="-10" x2="70" y2="34" stroke="#FBBF24" stroke-width="4" stroke-linecap="round"/>
    <circle cx="70" cy="40" r="7" fill="#FBBF24"/>
  </g>
  <!-- sparkles -->
  <g fill="#FBBF24">
    <path d="M480 120 l6 14 14 6 -14 6 -6 14 -6 -14 -14 -6 14 -6 Z" opacity="0.9"/>
    <path d="M110 300 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 Z" opacity="0.8"/>
    <circle cx="520" cy="240" r="6" opacity="0.7"/>
    <circle cx="150" cy="240" r="5" opacity="0.6"/>
  </g>
</svg>
