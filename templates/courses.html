{% extends 'layout.html' %}
{% block content %}
  <div class="page-header">
    <h1>Courses</h1>
    <a class="button" href="{{ url_for('add_course') }}">Add Course</a>
  </div>
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Description</th>
      </tr>
    </thead>
    <tbody>
      {% for course in courses %}
        <tr>
          <td>{{ course.title }}</td>
          <td>{{ course.description }}</td>
        </tr>
      {% else %}
        <tr><td colspan="2">No courses yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
