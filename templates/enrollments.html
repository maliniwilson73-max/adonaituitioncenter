{% extends 'layout.html' %}
{% block content %}
  <div class="page-header">
    <h1>Enrollments</h1>
  </div>
  <form method="post" action="{{ url_for('add_enrollment') }}" class="form-panel">
    <label>Student</label>
    <select name="student_id" required>
      <option value="">Select a student</option>
      {% for student in students %}
        <option value="{{ student.id }}">{{ student.name }}</option>
      {% endfor %}
    </select>
    <label>Course</label>
    <select name="course_id" required>
      <option value="">Select a course</option>
      {% for course in courses %}
        <option value="{{ course.id }}">{{ course.title }}</option>
      {% endfor %}
    </select>
    <button type="submit" class="button button-primary">Add Enrollment</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>Student</th>
        <th>Course</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for enrollment in enrollments %}
        <tr>
          <td>{{ enrollment.student_name }}</td>
          <td>{{ enrollment.course_title }}</td>
          <td>
            <form action="{{ url_for('delete_enrollment', enrollment_id=enrollment.id) }}" method="post" class="inline-form">
              <button type="submit" class="button button-danger">Remove</button>
            </form>
          </td>
        </tr>
      {% else %}
        <tr><td colspan="3">No enrollments yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
