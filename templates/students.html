{% extends 'layout.html' %}
{% block content %}
  <div class="page-header">
    <h1>Students</h1>
    <a class="button" href="{{ url_for('add_student') }}">Add Student</a>
  </div>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for student in students %}
        <tr>
          <td>{{ student.name }}</td>
          <td>{{ student.email }}</td>
          <td>{{ student.phone }}</td>
          <td>
            <form action="{{ url_for('delete_student', student_id=student.id) }}" method="post" class="inline-form">
              <button type="submit" class="button button-danger">Delete</button>
            </form>
          </td>
        </tr>
      {% else %}
        <tr><td colspan="4">No students yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
